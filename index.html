<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unisex Salon | Windlass River Valley</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Salon</div>
    <div class="links">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#gallery">Gallery</a>
        <a href="#appointment">Appointment</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- HOME -->
<section id="home">
    <div class="hero">
        <h1>Luxury Unisex Salon</h1>
        <p>Windlass River Valley Apartments</p>
        <button onclick="scrollToSection('appointment')">Book Now</button>
    </div>
</section>

<!-- SERVICES -->
<section id="services">
    <h2>Our Services</h2>

    <div class="grid">
        <div class="card">
            <h3>Haircut</h3>
            <p>₹200 - ₹500</p>
        </div>

        <div class="card">
            <h3>Facial</h3>
            <p>₹800 - ₹2000</p>
        </div>

        <div class="card">
            <h3>Hair Color</h3>
            <p>₹1000+</p>
        </div>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Gallery</h2>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
        <img src="https://images.unsplash.com/photo-1487412912498-0447578fcca8">
        <img src="https://images.unsplash.com/photo-1500840216050-6ffa99d75160">
    </div>
</section>

<!-- APPOINTMENT -->
<section id="appointment">
    <h2>Book Appointment</h2>
    <p>Select time and service online</p>

    <iframe 
        src="https://calendly.com/chaitanyaroy3019/30min"
        width="100%" 
        height="600"
        style="border: none;">
    </iframe>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact Us</h2>

    <p id="number">+91 7367977814</p>

    <button onclick="copyNumber()">Copy Number</button>
</section>

<script src="script.js"></script>

</body>
</html>
